{% extends 'base.html' %}
{% block content %}
<h2>➕ Nouveau Rendez-vous</h2>
<form method="POST" class="mt-3" style="max-width:500px">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Patient</label>
        <select name="patient" class="form-control" required>
            {% for p in patients %}
            <option value="{{ p.id_patient }}">{{ p.nom }} {{ p.prenom }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Médecin</label>
        <select name="medecin" class="form-control" required>
            {% for m in medecins %}
            <option value="{{ m.id_medecin }}">{{ m.nom }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date_rdv" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="/rdv/" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
